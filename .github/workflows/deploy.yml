name: Deploy Frontend to AWS

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Clean up misplaced folders on S3
        run: |
          aws s3 rm "s3://veai-careready-frontend/gutpacer/gutpacer/" --recursive || true
          aws s3 rm "s3://veai-careready-frontend/gutpacer /" --recursive || true

      - name: Sync frontend to S3
        run: |
          aws --version
          aws s3 sync "frontend/" "s3://veai-careready-frontend/gutpacer/" \
            --delete \
            --exclude "config.js"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/gutpacer/" "/gutpacer/*"

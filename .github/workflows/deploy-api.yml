name: Deploy API Lambda

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'backend/index.mjs'
      - '.github/workflows/deploy-api.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npm test

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Handler is index.handler, so index.mjs must sit at the zip root.
      # -j strips the backend/ path. AWS SDK v3 is bundled in the nodejs runtime,
      # so no node_modules are packaged.
      - name: Package Lambda code
        run: |
          zip -j function.zip backend/index.mjs

      # Lambda functions live in us-east-1. The AWS_REGION secret is a
      # different region, so target the function region explicitly here
      # (a region mismatch causes AccessDenied against the us-east-1 ARN).
      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name gutpacer-backend \
            --zip-file fileb://function.zip \
            --region us-east-1

name: Deploy Notifier Lambda

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'backend/notifier/**'
      - '.github/workflows/deploy-notifier.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Handler is index.handler, so index.mjs must sit at the zip root.
      # -j strips the backend/notifier/ path (previously the file was zipped
      # with its full path, which would not resolve at runtime).
      - name: Package Lambda code
        run: |
          zip -j function.zip backend/notifier/index.mjs

      # Lambda functions live in us-east-1. The AWS_REGION secret is a
      # different region, so target the function region explicitly here
      # (a region mismatch causes AccessDenied against the us-east-1 ARN).
      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name gutpacer-notifier \
            --zip-file fileb://function.zip \
            --region us-east-1

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GutPacer // 腸のペースを整える排便トラッカー</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        -webkit-tap-highlight-color: transparent;
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen pb-12">

    <header class="bg-white border-b border-slate-200 py-6 px-4 text-center shadow-xs">
        <div class="flex flex-col items-center justify-center gap-2">
            <div class="w-16 h-16 bg-gradient-to-br from-blue-600 to-indigo-800 rounded-2xl shadow-md flex items-center justify-center text-white text-3xl">
                <i class="fa-solid fa-arrows-spin"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight mt-2 text-indigo-950">GutPacer</h1>
            <p class="text-xs text-slate-500 font-medium">腸のペースを整える排便トラッカー // Module of ParkinSync</p>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6 space-y-4">

        <section class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 text-center space-y-1.5">
            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">現在の排便ステータス (Status)</div>
            <div id="lastStoolDisplay" class="flex justify-center items-center">
                <span class="text-slate-400 text-xs animate-pulse">データを読み込み中...</span>
            </div>
        </section>

        <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 space-y-4">
            <h2 class="text-base font-bold text-slate-900 flex items-center gap-2">
                <span class="text-xl">📅</span> Daily Status (基本情報)
            </h2>
            <hr class="border-slate-100">

            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-wider block">日にち (Date)</label>
                <input type="date" id="logDate" class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl py-3 px-3 font-bold text-slate-700 focus:border-indigo-500 focus:outline-hidden transition-all">
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-wider block">その日の調子 (Condition: 1〜5)</label>
                <div class="grid grid-cols-5 gap-2">
                    <button type="button" onclick="selectCondition(1, this)" class="cond-btn border-2 border-slate-200 rounded-xl py-2.5 text-center font-bold text-slate-600 bg-white active:scale-95 transition-all">1</button>
                    <button type="button" onclick="selectCondition(2, this)" class="cond-btn border-2 border-slate-200 rounded-xl py-2.5 text-center font-bold text-slate-600 bg-white active:scale-95 transition-all">2</button>
                    <button type="button" onclick="selectCondition(3, this)" class="cond-btn border-2 border-slate-200 rounded-xl py-2.5 text-center font-bold text-slate-600 bg-white active:scale-95 transition-all">3</button>
                    <button type="button" onclick="selectCondition(4, this)" class="cond-btn border-2 border-slate-200 rounded-xl py-2.5 text-center font-bold text-slate-600 bg-white active:scale-95 transition-all">4</button>
                    <button type="button" onclick="selectCondition(5, this)" class="cond-btn border-2 border-slate-200 rounded-xl py-2.5 text-center font-bold text-slate-600 bg-white active:scale-95 transition-all">5</button>
                </div>
            </div>
        </section>

        <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 space-y-4">
            <h2 class="text-base font-bold text-slate-900 flex items-center gap-2">
                <span class="text-xl">💩</span> Bowel Tracker (排便記録)
            </h2>
            <p class="text-xs text-slate-400">※便が出た場合は、以下の量と状態を選択してください。選択しなければ「便なし」として記録されます。</p>
            <hr class="border-slate-100">

            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-wider block">量 (Amount)</label>
                <div class="grid grid-cols-3 gap-2">
                    <button type="button" onclick="selectAmount('小 (S)', this)" class="amount-btn border-2 border-slate-200 rounded-xl py-3 text-center font-bold text-slate-600 bg-white active:scale-95 transition-all">小 (S)</button>
                    <button type="button" onclick="selectAmount('中 (M)', this)" class="amount-btn border-2 border-slate-200 rounded-xl py-3 text-center font-bold text-slate-600 bg-white active:scale-95 transition-all">中 (M)</button>
                    <button type="button" onclick="selectAmount('大 (L)', this)" class="amount-btn border-2 border-slate-200 rounded-xl py-3 text-center font-bold text-slate-600 bg-white active:scale-95 transition-all">大 (L)</button>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-wider block">状態 (Type)</label>
                <select id="stoolType" class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl py-3 px-3 font-bold text-slate-700 focus:border-indigo-500 focus:outline-hidden transition-all">
                    <option value="硬い（コロコロ）">硬い（コロコロ・カチカチ）</option>
                    <option value="柔らかい（軟便）">柔らかい（ドロドロ・軟便）</option>
                    <option value="水っぽい（下痢）">水っぽい（下痢）</option>
                    <option value="普通（バナナ状）">普通（バナナ状・するっと）</option>
                </select>
            </div>

            <div class="space-y-2 pt-2 border-t border-slate-100">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-wider block">医療処置・サポート (Medical Care)</label>
                <div class="grid grid-cols-2 gap-2">
                    <label class="flex items-center justify-between p-3.5 bg-slate-50 rounded-xl border-2 border-slate-200 cursor-pointer active:bg-slate-100 transition-all select-none">
                        <span class="font-bold text-slate-700 text-xs flex items-center gap-1.5"><i class="fa-solid fa-syringe text-blue-500"></i> 浣腸あり</span>
                        <input type="checkbox" id="careEnema" class="w-5 h-5 border-slate-300 text-indigo-600 focus:ring-indigo-500 rounded-md">
                    </label>
                    <label class="flex items-center justify-between p-3.5 bg-slate-50 rounded-xl border-2 border-slate-200 cursor-pointer active:bg-slate-100 transition-all select-none">
                        <span class="font-bold text-slate-700 text-xs flex items-center gap-1.5"><i class="fa-solid fa-user-nurse text-teal-500"></i> 摘便ヘルプ</span>
                        <input type="checkbox" id="careManual" class="w-5 h-5 border-slate-300 text-indigo-600 focus:ring-indigo-500 rounded-md">
                    </label>
                </div>
            </div>
        </section>

        <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 space-y-4">
            <h2 class="text-base font-bold text-slate-900 flex items-center gap-2">
                <span class="text-xl">💊</span> Medication Tracker (モヴィコール)
            </h2>
            <hr class="border-slate-100">

            <div class="space-y-2">
                <div class="space-y-2">
                    <label class="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100 cursor-pointer active:bg-slate-100 transition-all">
                        <span class="font-bold text-slate-700 flex items-center gap-2"><i class="fa-solid fa-sun text-amber-500"></i> 朝 (Morning)</span>
                        <input type="checkbox" id="medMorning" class="w-6 h-6 rounded-sm border-slate-300 text-indigo-600 focus:ring-indigo-500">
                    </label>
                    <label class="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100 cursor-pointer active:bg-slate-100 transition-all">
                        <span class="font-bold text-slate-700 flex items-center gap-2"><i class="fa-solid fa-cloud-sun text-orange-400"></i> 昼 (Noon)</span>
                        <input type="checkbox" id="medNoon" class="w-6 h-6 rounded-sm border-slate-300 text-indigo-600 focus:ring-indigo-500">
                    </label>
                    <label class="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100 cursor-pointer active:bg-slate-100 transition-all">
                        <span class="font-bold text-slate-700 flex items-center gap-2"><i class="fa-solid fa-moon text-indigo-400"></i> 夜 (Evening)</span>
                        <input type="checkbox" id="medEvening" class="w-6 h-6 rounded-sm border-slate-300 text-indigo-600 focus:ring-indigo-500">
                    </label>
                </div>
            </div>
        </section>

        <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 space-y-4">
            <h2 class="text-base font-bold text-slate-900 flex items-center gap-2">
                <span class="text-xl">📝</span> Notes (ノート)
            </h2>
            <hr class="border-slate-100">
            <textarea id="logNotes" rows="3" placeholder="様子の変化、お腹の張り、メモなどを自由に入力してください..." class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl py-3 px-3 font-medium text-slate-700 focus:border-indigo-500 focus:outline-hidden transition-all resize-none"></textarea>
        </section>

        <button type="button" id="saveBtn" onclick="saveGutLog()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-md active:scale-[0.99] transition-all flex items-center justify-center gap-2 text-base disabled:bg-slate-400">
            <i class="fa-solid fa-cloud-arrow-up"></i> 記録を保存する (Save Log)
        </button>

        <section class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 space-y-4">
            <h2 class="text-base font-bold text-slate-900 flex items-center gap-2">
                <span class="text-xl">📊</span> 履歴 (History)
            </h2>
            <hr class="border-slate-100">

            <div id="logHistoryList" class="space-y-3 max-h-96 overflow-y-auto pr-1 text-sm text-slate-500">
                <p class="text-center py-4 text-slate-400">履歴を読み込み中...</p>
            </div>
        </section>

    </main>

    <script>
        let selectedAmountValue = '';
        let selectedConditionValue = 0;

        window.onload = function() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('logDate').value = `${yyyy}-${mm}-${dd}`;

            // サーバーからデータを取ってくる
            fetchLogsFromServer();
        };

        function selectCondition(score, element) {
            document.querySelectorAll('.cond-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'border-indigo-600', 'text-white');
                btn.classList.add('bg-white', 'border-slate-200', 'text-slate-600');
            });
            element.classList.remove('bg-white', 'border-slate-200', 'text-slate-600');
            element.classList.add('bg-indigo-600', 'border-indigo-600', 'text-white');
            selectedConditionValue = score;
        }

        function selectAmount(amount, element) {
            document.querySelectorAll('.amount-btn').forEach(btn => {
                btn.classList.remove('border-indigo-600', 'bg-indigo-50', 'text-indigo-600');
                btn.classList.add('border-slate-200', 'bg-white', 'text-slate-600');
            });
            element.classList.remove('border-slate-200', 'bg-white', 'text-slate-600');
            element.classList.add('border-indigo-600', 'bg-indigo-50', 'text-indigo-600');
            selectedAmountValue = amount;
        }

        function updateLastStoolDisplay(logs) {
            const displayElem = document.getElementById('lastStoolDisplay');
            const lastStoolLog = logs.find(log => log.hasStool);
            
            if (!lastStoolLog) {
                displayElem.innerHTML = `<span class="bg-slate-100 text-slate-600 px-4 py-2 rounded-full text-xs font-bold border border-slate-200"><i class="fa-solid fa-circle-question mr-1"></i> 排便データがまだありません</span>`;
                return;
            }
            
            const lastDate = new Date(lastStoolLog.fullDate + 'T00:00:00');
            const today = new Date();
            today.setHours(0,0,0,0);
            lastDate.setHours(0,0,0,0);
            
            const diffTime = today - lastDate;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            let badgeClass = "";
            let text = "";
            
            if (diffDays === 0) {
                badgeClass = "bg-emerald-50 text-emerald-700 border border-emerald-200";
                text = `✨ 最後の排便：今日 (${lastStoolLog.date})`;
            } else if (diffDays === 1) {
                badgeClass = "bg-blue-50 text-blue-700 border border-blue-200";
                text = `👍 最後の排便：昨日・1日前 (${lastStoolLog.date})`;
            } else if (diffDays === 2) {
                badgeClass = "bg-amber-50 text-amber-700 border border-amber-300 font-bold animate-pulse";
                text = `⚠️ 最後の排便：2日前 (${lastStoolLog.date}) ➔ 浣腸を検討`;
            } else {
                badgeClass = "bg-rose-50 text-rose-700 border border-rose-300 font-black";
                text = `🚨 最後の排便：${diffDays}日前 (${lastStoolLog.date}) ➔ 浣腸してください`;
            }
            
            displayElem.innerHTML = `<span class="${badgeClass} px-4 py-2 rounded-xl text-xs sm:text-sm tracking-wide shadow-xs block w-full text-center">${text}</span>`;
        }

        // 📡 【新機能】AWSから履歴データを取得する
        async function fetchLogsFromServer() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('サーバーエラー');
                const logs = await response.json();
                displayLogs(logs);
            } catch (error) {
                console.error(error);
                document.getElementById('logHistoryList').innerHTML = '<p class="text-center py-4 text-rose-500 font-bold">サーバーからデータを取得できませんでした</p>';
            }
        }

        // 📡 【新機能】AWSにデータを送信・保存する
        async function saveGutLog() {
            const rawDate = document.getElementById('logDate').value;
            if (!rawDate) {
                alert('日付を選択してください');
                return;
            }
            const dateParts = rawDate.split('-');
            const formattedDate = `${parseInt(dateParts[1])}/${parseInt(dateParts[2])}`;

            const hasStool = selectedAmountValue !== '';
            const isEnema = document.getElementById('careEnema').checked;
            const isManual = document.getElementById('careManual').checked;

            const logEntry = {
                date: formattedDate,
                fullDate: rawDate,
                condition: selectedConditionValue,
                hasStool: hasStool,
                bowel: hasStool ? { amount: selectedAmountValue, type: document.getElementById('stoolType').value } : null,
                enema: isEnema,
                manualHelp: isManual,
                meds: {
                    morning: document.getElementById('medMorning').checked,
                    noon: document.getElementById('medNoon').checked,
                    evening: document.getElementById('medEvening').checked
                },
                notes: document.getElementById('logNotes').value.trim()
            };

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> 保存中...';

            try {
                // Lambdaに関数URL経由でPOST送信！
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(logEntry)
                });

                if (!response.ok) throw new Error('保存に失敗しました');

                alert('AWSサーバーに記録を保存しました！');
                resetForm();
                // 保存が成功したら最新のデータをサーバーから再取得して画面を更新
                await fetchLogsFromServer();
            } catch (error) {
                alert('エラー: ' + error.message);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> 記録を保存する (Save Log)';
            }
        }

        // 履歴の描画処理
        function displayLogs(existingLogs) {
            const logHistoryList = document.getElementById('logHistoryList');

            updateLastStoolDisplay(existingLogs);

            if (!existingLogs || existingLogs.length === 0) {
                logHistoryList.innerHTML = '<p class="text-center py-4 text-slate-400">まだ記録がありません</p>';
                return;
            }

            let html = '';
            existingLogs.forEach(log => {
                let stars = 'ー';
                if (log.condition > 0) {
                    stars = '⭐'.repeat(log.condition) + '✨'.repeat(5 - log.condition);
                }

                html += `<div class="p-4 bg-slate-50 rounded-xl border border-slate-100 space-y-2.5 shadow-xs">
                    <div class="flex justify-between items-center text-xs font-bold text-slate-500 border-b border-slate-200/60 pb-1.5">
                        <span class="text-sm text-indigo-950"><i class="fa-regular fa-calendar"></i> ${log.date}</span>
                        <span class="bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded-sm">調子: ${stars}</span>
                    </div>
                    <div class="flex flex-wrap gap-1.5 text-xs">`;
                
                if (log.hasStool) {
                    html += `<span class="bg-amber-100 text-amber-800 font-bold px-2.5 py-1 rounded-sm">💩 便: あり [${log.bowel.amount}・${log.bowel.type}]</span>`;
                } else {
                    html += `<span class="bg-slate-200 text-slate-500 px-2.5 py-1 rounded-sm">💩 便: なし</span>`;
                }

                if (log.enema) {
                    html += `<span class="bg-blue-100 text-blue-800 font-bold px-2.5 py-1 rounded-sm"><i class="fa-solid fa-syringe"></i> 浣腸あり</span>`;
                }
                if (log.manualHelp) {
                    html += `<span class="bg-teal-100 text-teal-800 font-bold px-2.5 py-1 rounded-sm"><i class="fa-solid fa-user-nurse"></i> 摘便ヘルプ</span>`;
                }
                
                let medList = [];
                if (log.meds.morning) medList.push('朝');
                if (log.meds.noon) medList.push('昼');
                if (log.meds.evening) medList.push('夜');
                
                if (medList.length > 0) {
                    html += `<span class="bg-emerald-100 text-emerald-800 font-bold px-2.5 py-1 rounded-sm">💊 薬: ${medList.join('・')}</span>`;
                } else {
                    html += `<span class="bg-rose-50 text-rose-600 px-2.5 py-1 rounded-sm">💊 薬: 未服用</span>`;
                }

                html += `</div>`;

                if (log.notes) {
                    html += `<div class="text-xs bg-white p-2 rounded-lg border border-slate-200/60 text-slate-600 whitespace-pre-wrap mt-1"><i class="fa-solid fa-pen text-slate-400 mr-1"></i>${log.notes}</div>`;
                }

                html += `</div>`;
            });

            logHistoryList.innerHTML = html;
        }

        function resetForm() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('logDate').value = `${yyyy}-${mm}-${dd}`;

            selectedConditionValue = 0;
            document.querySelectorAll('.cond-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'border-indigo-600', 'text-white');
                btn.classList.add('bg-white', 'border-slate-200', 'text-slate-600');
            });

            selectedAmountValue = '';
            document.querySelectorAll('.amount-btn').forEach(btn => {
                btn.classList.remove('border-indigo-600', 'bg-indigo-50', 'text-indigo-600');
                btn.classList.add('border-slate-200', 'bg-white', 'text-slate-600');
            });

            document.getElementById('stoolType').value = '硬い（コロコロ）';
            document.getElementById('careEnema').checked = false;
            document.getElementById('careManual').checked = false;
            document.getElementById('medMorning').checked = false;
            document.getElementById('medNoon').checked = false;
            document.getElementById('medEvening').checked = false;
            document.getElementById('logNotes').value = '';
        }
    </script>
</body>
</html>
